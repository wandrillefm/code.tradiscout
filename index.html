<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Outils - Tradiscout</title>
    <link rel="icon" type="image/x-icon" href="FINAL.png">
    <link href="https://fonts.googleapis.com/css2?family=Uncial+Antiqua&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root { --navy: #2C3776; --bg: #F8F2E7; --or: #c9a84c; --gris: #6b6b6b; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--navy); font-family: 'DM Mono', monospace; min-height: 100vh; overflow-x: hidden; }
        header { position: sticky; top: 0; z-index: 600; background: var(--bg); border-bottom: 1px solid rgba(44,55,118,0.12); display: flex; align-items: center; justify-content: space-between; padding: 0 5%; height: 64px; }
        .logo { font-family: 'Uncial Antiqua', serif; text-transform: uppercase; letter-spacing: 2px; font-size: 1.6rem; color: var(--navy); text-decoration: none; }
        .main-nav { display: flex; gap: 32px; align-items: center; }
        .main-nav a { text-decoration: none; color: var(--navy); font-size: 0.72rem; letter-spacing: 0.1em; text-transform: lowercase; opacity: 0.4; transition: 0.2s; position: relative; padding-bottom: 3px; }
        .main-nav a:hover, .main-nav a.active { opacity: 1; }
        .main-nav a.active::after { content: ''; position: absolute; bottom: 0; left: 0; width: 100%; height: 1px; background: var(--navy); }
        .content-wrap { max-width: 800px; margin: 0 auto; padding: 48px 5% 120px; text-align: center; }
        .code-nav { display: flex; justify-content: center; gap: 4px; margin-bottom: 20px; flex-wrap: wrap; }
        .code-nav button { padding: 0.3rem 0.7rem; border: 1px solid rgba(44,55,118,0.22); background: transparent; color: var(--navy); cursor: pointer; font-family: 'DM Mono'; font-size: 0.6rem; letter-spacing: 0.05em; }
        .code-nav button.active { background: var(--navy); color: var(--bg); border-color: var(--navy); }
        .code-tab { display: none; }
        textarea { width: 100%; padding: 8px; resize: none; height: 90px; border: 1px solid rgba(44,55,118,0.22); background: white; font-family: 'DM Mono'; font-size: 0.7rem; color: var(--navy); margin-top: 6px; }
        .semaphore-wrapper { margin-top: 20px; margin-bottom: 40px; }
        #semaphore-canvas { border: 1px solid rgba(44,55,118,0.22); background: white; }

        footer { background: var(--navy); color: var(--bg); padding: 64px 5% 40px; }
        .footer-inner { max-width: 860px; margin: 0 auto; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 48px; }
        .footer-col-title { font-size: 0.52rem; letter-spacing: 0.18em; text-transform: uppercase; color: var(--or); margin-bottom: 25px; display: block; }
        .footer-links { list-style: none; display: flex; flex-direction: column; gap: 12px; }
        .footer-links li a { color: var(--bg); text-decoration: none; display: flex; flex-direction: column; gap: 2px; transition: opacity 0.2s; }
        .footer-links li a:hover { opacity: 0.7; }
        .footer-links li a .fl-label { font-size: 0.46rem; letter-spacing: 0.14em; text-transform: uppercase; opacity: 0.5; color: var(--bg); }
        .footer-links li a .fl-name { font-size: 0.62rem; letter-spacing: 0.05em; color: var(--bg); }
        .footer-contact-text { font-size: 0.6rem; opacity: 0.5; line-height: 1.8; margin-bottom: 16px; color: var(--bg); }
        .footer-email { color: var(--or); text-decoration: none; font-size: 0.65rem; letter-spacing: 0.06em; font-weight: 500; }
        .footer-bottom { max-width: 860px; margin: 48px auto 0; padding-top: 20px; border-top: 1px solid rgba(248,242,231,0.1); display: flex; justify-content: space-between; align-items: center; }
        .footer-bottom span { font-size: 0.5rem; letter-spacing: 0.12em; text-transform: uppercase; opacity: 0.35; }
        .tab-bar { display: none; }
        @media (max-width: 768px) {
            header { justify-content: center; } .main-nav { display: none; }
            .tab-bar { display: flex; position: fixed; bottom: 0; left: 0; width: 100%; background: var(--bg); border-top: 1px solid rgba(44,55,118,0.13); z-index: 1000; padding-bottom: env(safe-area-inset-bottom, 0px); }
            .tab-bar-btn { flex: 1; display: flex; align-items: center; justify-content: center; padding: 20px 0; text-decoration: none; color: var(--navy); opacity: 0.3; }
            .tab-bar-btn.active { opacity: 1; }
            .tab-bar-btn span { font-size: 0.65rem; letter-spacing: 0.1em; text-transform: lowercase; }
            footer { padding-bottom: calc(100px + env(safe-area-inset-bottom, 0px)); }
        }
    </style>
</head>
<body>
    <header>
        <a class="logo" href="https://tradiscout.com">TRADISCOUT</a>
        <nav class="main-nav"><a href="https://tradiscout.com">accueil</a><a href="https://shop.tradiscout.com">boutique</a><a href="/" class="active">code</a></nav>
    </header>
    <div class="content-wrap">
        <div class="code-nav">
            <button onclick="showCodeTab('code-semaphore', this)" class="active">Sémaphore</button>
            <button onclick="showCodeTab('code-morse', this)">Morse</button>
            <button onclick="showCodeTab('code-caesar', this)">César</button>
            <button onclick="showCodeTab('code-vigenere', this)">Vigenère</button>
        </div>
        <div id="code-semaphore" class="code-tab" style="display:block">
            <p style="font-size:0.7rem">Fais tourner les bras pour décoder.</p>
            <div class="semaphore-wrapper"><canvas id="semaphore-canvas" width="260" height="260"></canvas><p>Lettre : <span id="semaphore-letter">?</span></p></div>
        </div>
        <div id="code-morse" class="code-tab"><textarea id="morse-input" placeholder="Texte ou Morse"></textarea><textarea id="morse-output" readonly style="background:rgba(0,0,0,0.03)"></textarea></div>
        <div id="code-caesar" class="code-tab">
            <label style="font-size:0.6rem">Shift: <input type="number" id="shift" value="3" style="width:40px"></label>
            <textarea id="caesar-input" placeholder="Texte clair"></textarea><textarea id="caesar-output" readonly style="background:rgba(0,0,0,0.03)"></textarea>
        </div>
        <div id="code-vigenere" class="code-tab">
            <input type="text" id="vig-key" placeholder="CLE" style="padding:5px; margin-bottom:5px">
            <textarea id="vig-input" placeholder="Message"></textarea><textarea id="vig-output" readonly style="background:rgba(0,0,0,0.03)"></textarea>
        </div>
    </div>
    <footer>
        <div class="footer-inner">
            <div><span class="footer-col-title">Réseaux</span><ul class="footer-links"><li><a href="https://instagram.com/tradiscout" target="_blank"><span class="fl-label">Instagram</span><span class="fl-name">4 200+</span></a></li><li><a href="https://www.tiktok.com/@tradiscout" target="_blank"><span class="fl-label">TikTok</span><span class="fl-name">20+</span></a></li></ul></div>
            <div><span class="footer-col-title">Ressources</span><ul class="footer-links"><li><a href="https://open.spotify.com/playlist/4dol5mUeugWo8hvZdXnvZ8" target="_blank"><span class="fl-label">Spotify</span><span class="fl-name">500 titres</span></a></li><li><a href="https://tradiscout.notion.site/" target="_blank"><span class="fl-label">Notion</span><span class="fl-name">Ressources</span></a></li></ul></div>
            <div><span class="footer-col-title">Contact</span><p class="footer-contact-text">Une suggestion ?</p><a href="mailto:tradiscout@gmail.com" class="footer-email">tradiscout@gmail.com</a></div>
        </div>
        <div class="footer-bottom"><span>© 2026 Tradiscout</span><span>Verso l'Alto!</span></div>
    </footer>
    <nav class="tab-bar">
        <a href="https://tradiscout.com" class="tab-bar-btn"><span>accueil</span></a>
        <a href="https://shop.tradiscout.com" class="tab-bar-btn"><span>boutique</span></a>
        <a href="/" class="tab-bar-btn active"><span>code</span></a>
    </nav>
    <script>
        function showCodeTab(id, btn) { document.querySelectorAll('.code-tab').forEach(t => t.style.display = 'none'); document.getElementById(id).style.display = 'block'; document.querySelectorAll('.code-nav button').forEach(b => b.classList.remove('active')); btn.classList.add('active'); }
        // ... (Logique Morse/César/Semaphore déjà fournie précédemment, à conserver) ...
    </script>
</body>
</html>
